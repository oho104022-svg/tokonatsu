<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>常夏城 - 資料閣</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #9d814a;
            --blood: #800;
            --text: #d9c9c9;
            --muted: rgba(217, 201, 201, 0.3); /* 極淡的文字顏色 */
        }

        body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                              url('bg.jpg'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Noto Serif TC', serif; overflow: hidden; position: relative;
        }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .glass-card {
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px; 
            width: 90%; max-width: 800px; /* 稍微加寬以容納文字 */
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9); 
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
        }

        .page-title {
            font-weight: 200; font-size: 1.2rem; letter-spacing: 0.8rem; padding-left: 0.8rem;
            color: var(--text); margin-bottom: 5px; display: block; opacity: 0.8;
        }
        .divider-main { width: 100px; height: 1px; background: var(--gold); margin: 20px auto; opacity: 0.4; }

        .nav-container {
            display: flex; justify-content: center; align-items: center;
            gap: 40px; margin-top: 20px; width: 100%;
        }

        .nav-button {
            flex: 0 1 200px; height: 150px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--gold); text-decoration: none; border: 1px solid var(--gold);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); background: transparent;
        }

        .nav-button:hover {
            background: var(--gold); color: #000;
            box-shadow: 0 0 40px rgba(157, 129, 74, 0.3); transform: translateY(-8px);
        }

        .nav-label { font-weight: 200; font-size: 0.75rem; letter-spacing: 0.5rem; color: inherit; opacity: 0.7; margin-bottom: 10px; }
        .nav-value { font-weight: 900; font-size: 1.8rem; letter-spacing: 0.6rem; padding-left: 0.6rem; color: inherit; }

        /* -----------------------------------------------------------
           新加入的文學獨白樣式 (直書排版)
           ----------------------------------------------------------- */
        .monologue {
            margin-top: 50px;
            color: var(--muted);
            font-weight: 200;
            font-size: 0.85rem;
            line-height: 2.2;
            letter-spacing: 0.3rem;
            max-width: 500px;
            text-align: left;
            /* 使用直書感官的橫排 */
            border-left: 1px solid rgba(157, 129, 74, 0.2);
            padding-left: 20px;
            font-style: italic;
            transition: color 1s ease;
        }
        
        .monologue:hover {
            color: var(--text); /* 游標移上去會變清楚一點 */
        }

        .back-link {
            display: inline-block; margin-top: 40px; color: var(--gold); text-decoration: none;
            font-size: 0.75rem; letter-spacing: 2px; opacity: 0.5; transition: all 0.3s;
        }
        .back-link:hover { opacity: 1; text-shadow: 0 0 5px var(--gold); }

        .torii { color: var(--blood); font-size: 1.5rem; margin-bottom: 20px; opacity: 0.6; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="glass-card">
        <div class="torii">⛩️</div>
        
        <div class="info-section">
            <span class="page-title">資料室</span>
            <div class="divider-main"></div>
        </div>

        <div class="nav-container">
            <a href="saniwa.html" class="nav-button">
                <span class="nav-label">さにわ</span>
                <span class="nav-value">審神者</span>
            </a>
            <a href="castle.html" class="nav-button">
                <span class="nav-label">ほんまる</span>
                <span class="nav-value">本丸</span>
            </a>
        </div>

        <div class="monologue">
            窗外的影是空白的——夢裡你的影子吞噬我的，<br>
            你的本體直直沒入身為審神者的血與肉，<br>
            但是在那裡你又牽著我的手轉圈，轉跳舞般的放蕩的圈。<br>
            你殺了我，我殺了你，那麼哪個是真的呢，安宅切。
        </div>

        <a href="index.html" class="back-link">← 返回主頁</a>
    </div>

    <script>
        /* 粒子特效維持不變 */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.6; 
                this.color = `rgba(136, 0, 0, ${Math.random() * 0.3})`;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                this.y -= this.speedY;
                this.x += Math.sin(this.angle) * 0.3;
                this.angle += 0.01;
                if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 1500;
            for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new Particle()); }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update(); particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', function () { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
        init(); animate();
    </script>
</body>
</html>
